services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/.htpasswd:/etc/nginx/.htpasswd:ro

  setup:
    image: node:22-alpine
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hr_copilot?schema=public
      PNPM_STORE_DIR: /pnpm/store
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm/store
      - workspace_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
    command: >
      sh -lc "
        corepack enable &&
        pnpm config set store-dir /pnpm/store &&
        pnpm install --frozen-lockfile &&
        pnpm --filter @hr-copilot/db prisma generate &&
        pnpm db:deploy
      "

  web:
    image: node:22-alpine
    working_dir: /workspace
    depends_on:
      - api
    environment:
      NODE_ENV: development
      VITE_API_BASE_PATH: /api
      VITE_MAX_CV_FILE_SIZE_MB: ${MAX_CV_FILE_SIZE_MB:-10}
      CHOKIDAR_USEPOLLING: "true"
      PNPM_STORE_DIR: /pnpm/store
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm/store
      - workspace_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
    command: >
      sh -lc "
        corepack enable &&
        pnpm config set store-dir /pnpm/store &&
        pnpm --filter @hr-copilot/web dev
      "

  api:
    image: node:22-alpine
    working_dir: /workspace
    depends_on:
      setup:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ollama-model:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: 4000
      WEB_ORIGIN: http://localhost:8080
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hr_copilot?schema=public
      REDIS_URL: redis://redis:6379
      AI_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-300000}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-16384}
      AI_JOB_ATTEMPTS: ${AI_JOB_ATTEMPTS:-2}
      CV_EXTRACTION_CONCURRENCY: ${CV_EXTRACTION_CONCURRENCY:-1}
      AI_MATCH_CONCURRENCY: ${AI_MATCH_CONCURRENCY:-1}
      OCR_MAX_PAGES: ${OCR_MAX_PAGES:-10}
      OCR_TIMEOUT_MS: ${OCR_TIMEOUT_MS:-120000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-v.bichlt6@vinsmartfuture.tech}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-demo123}
      ADMIN_NAME: ${ADMIN_NAME:-Lường Bích}
      JWT_ACCESS_TOKEN_SECRET: ${JWT_ACCESS_TOKEN_SECRET:-dev-only-change-me-at-least-32-characters}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-28800}
      JWT_REFRESH_TOKEN_SECRET: ${JWT_REFRESH_TOKEN_SECRET:-dev-only-refresh-change-me-at-least-32-characters}
      JWT_REFRESH_TOKEN_TTL_SECONDS: ${JWT_REFRESH_TOKEN_TTL_SECONDS:-2592000}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      CV_STORAGE_DRIVER: ${CV_STORAGE_DRIVER:-r2}
      CV_ARCHIVE_STORAGE_DRIVER: ${CV_ARCHIVE_STORAGE_DRIVER:-vercel-blob}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-}
      S3_API: ${S3_API:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      s3_ACCESS_KEY: ${s3_ACCESS_KEY:-}
      s3_BUCKET: ${s3_BUCKET:-}
      s3_BUCKET_NAME: ${s3_BUCKET_NAME:-}
      s3_SECRET_ACCESS_KEY: ${s3_SECRET_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      s3_SECRET_KEY: ${s3_SECRET_KEY:-}
      CLOUD_FLARE_STORAGE_ACCOUNT_ID: ${CLOUD_FLARE_STORAGE_ACCOUNT_ID:-}
      CLOUDFLARE_R2_ACCOUNT_ID: ${CLOUDFLARE_R2_ACCOUNT_ID:-}
      BLOB_STORE_ID: ${BLOB_STORE_ID:-}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
      UPLOAD_DIR: /workspace/uploads
      MAX_CV_FILE_SIZE_MB: 10
      APPLICATION_RATE_LIMIT_MAX: ${APPLICATION_RATE_LIMIT_MAX:-5}
      APPLICATION_RATE_LIMIT_WINDOW_SECONDS: ${APPLICATION_RATE_LIMIT_WINDOW_SECONDS:-60}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-gmail}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      EMAIL_SMTP_PASS: ${EMAIL_SMTP_PASS:-}
      PNPM_STORE_DIR: /pnpm/store
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm/store
      - workspace_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
    command: >
      sh -lc "
        corepack enable &&
        pnpm config set store-dir /pnpm/store &&
        pnpm --filter @hr-copilot/api dev
      "

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hr_copilot
    ports:
      - "55432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hr_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    volumes:
      - redis_dev_data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 10m
      OLLAMA_NUM_PARALLEL: 1
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama-model:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull \"$${OLLAMA_MODEL}\""]

volumes:
  postgres_dev_data:
  redis_dev_data:
  ollama_data:
  pnpm_store:
  workspace_node_modules:
  web_node_modules:
  api_node_modules:
  db_node_modules:
  shared_node_modules:
