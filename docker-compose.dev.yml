services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/.htpasswd:/etc/nginx/.htpasswd:ro

  setup:
    image: node:22-alpine
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hr_copilot?schema=public
      PNPM_STORE_DIR: /pnpm/store
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm/store
      - workspace_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
    command: >
      sh -lc "
        corepack enable &&
        pnpm config set store-dir /pnpm/store &&
        pnpm install --frozen-lockfile &&
        pnpm --filter @hr-copilot/db prisma generate &&
        pnpm db:deploy
      "

  web:
    image: node:22-alpine
    working_dir: /workspace
    depends_on:
      - api
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_APP_URL: http://localhost:8080
      NEXT_PUBLIC_API_BASE_PATH: /api
      VITE_API_BASE_PATH: /api
      VITE_MAX_CV_FILE_SIZE_MB: ${VITE_MAX_CV_FILE_SIZE_MB:-10}
      API_BASE_URL: http://api:4000
      CHOKIDAR_USEPOLLING: "true"
      PNPM_STORE_DIR: /pnpm/store
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm/store
      - workspace_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
    command: >
      sh -lc "
        corepack enable &&
        pnpm config set store-dir /pnpm/store &&
        pnpm --filter @hr-copilot/web dev
      "

  api:
    image: node:22-alpine
    working_dir: /workspace
    depends_on:
      setup:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      WEB_ORIGIN: http://localhost:8080
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hr_copilot?schema=public
      ADMIN_EMAIL: ${ADMIN_EMAIL:-v.bichlt6@vinsmartfuture.tech}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-demo123}
      ADMIN_NAME: ${ADMIN_NAME:-Lường Bích}
      JWT_ACCESS_TOKEN_SECRET: ${JWT_ACCESS_TOKEN_SECRET:-dev-only-change-me-at-least-32-characters}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-28800}
      JWT_REFRESH_TOKEN_SECRET: ${JWT_REFRESH_TOKEN_SECRET:-dev-only-refresh-change-me-at-least-32-characters}
      JWT_REFRESH_TOKEN_TTL_SECONDS: ${JWT_REFRESH_TOKEN_TTL_SECONDS:-2592000}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      CV_STORAGE_DRIVER: ${CV_STORAGE_DRIVER:-r2}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-}
      S3_API: ${S3_API:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      s3_ACCESS_KEY: ${s3_ACCESS_KEY:-}
      s3_BUCKET: ${s3_BUCKET:-}
      s3_BUCKET_NAME: ${s3_BUCKET_NAME:-}
      s3_SECRET_ACCESS_KEY: ${s3_SECRET_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      s3_SECRET_KEY: ${s3_SECRET_KEY:-}
      CLOUD_FLARE_STORAGE_ACCOUNT_ID: ${CLOUD_FLARE_STORAGE_ACCOUNT_ID:-}
      CLOUDFLARE_R2_ACCOUNT_ID: ${CLOUDFLARE_R2_ACCOUNT_ID:-}
      BLOB_STORE_ID: ${BLOB_STORE_ID:-}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
      UPLOAD_DIR: /workspace/uploads
      MAX_CV_FILE_SIZE_MB: 10
      APPLICATION_RATE_LIMIT_MAX: ${APPLICATION_RATE_LIMIT_MAX:-5}
      APPLICATION_RATE_LIMIT_WINDOW_SECONDS: ${APPLICATION_RATE_LIMIT_WINDOW_SECONDS:-60}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-gmail}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      EMAIL_SMTP_PASS: ${EMAIL_SMTP_PASS:-}
      PNPM_STORE_DIR: /pnpm/store
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm/store
      - workspace_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - db_node_modules:/workspace/packages/db/node_modules
      - shared_node_modules:/workspace/packages/shared/node_modules
    command: >
      sh -lc "
        corepack enable &&
        pnpm config set store-dir /pnpm/store &&
        pnpm --filter @hr-copilot/api dev
      "

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hr_copilot
    ports:
      - "55432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hr_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
  pnpm_store:
  workspace_node_modules:
  web_node_modules:
  api_node_modules:
  db_node_modules:
  shared_node_modules:
