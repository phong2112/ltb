services:
  - type: web
    name: hr-copilot-api
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./apps/api/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "4000"
      - key: WEB_ORIGIN
        sync: false
      - key: WEB_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MIGRATION_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: JWT_ACCESS_TOKEN_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_TTL_SECONDS
        value: "28800"
      - key: JWT_REFRESH_TOKEN_SECRET
        generateValue: true
      - key: JWT_REFRESH_TOKEN_TTL_SECONDS
        value: "2592000"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: "none"
      - key: CV_STORAGE_DRIVER
        value: "r2"
      - key: CV_ARCHIVE_STORAGE_DRIVER
        value: "vercel-blob"
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: BLOB_READ_WRITE_TOKEN
        sync: false
      - key: UPLOAD_DIR
        value: "/app/uploads"
      - key: MAX_CV_FILE_SIZE_MB
        value: "10"
      - key: AI_PROVIDER
        value: "ollama"
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: "qwen3:4b"
      - key: OLLAMA_TIMEOUT_MS
        value: "300000"
      - key: OLLAMA_CONTEXT_LENGTH
        value: "16384"
      - key: AI_JOB_ATTEMPTS
        value: "2"
      - key: CV_EXTRACTION_CONCURRENCY
        value: "1"
      - key: AI_MATCH_CONCURRENCY
        value: "1"
      - key: OCR_MAX_PAGES
        value: "10"
      - key: OCR_TIMEOUT_MS
        value: "120000"
      - key: APPLICATION_RATE_LIMIT_MAX
        value: "5"
      - key: APPLICATION_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: SWAGGER_ENABLED
        value: "false"
      - key: EMAIL_PROVIDER
        value: "gmail"
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: EMAIL_SMTP_USER
        sync: false
      - key: EMAIL_SMTP_PASS
        sync: false
